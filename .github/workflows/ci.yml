name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.24.4
          cache-dependency-path: go.sum

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.13.5
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - name: Install reference dependencies
        run: python -m pip install --require-hashes --requirement requirements-dev.lock

      - name: Verify source formatting
        shell: bash
        run: |
          git diff --check
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Verify Go module
        run: |
          go mod verify
          go mod tidy -diff

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Validate schemas, fixtures, and references
        run: python -m unittest discover -s tests -v

      - name: Verify fixture checksums
        shell: bash
        run: |
          while IFS= read -r manifest; do
            (cd "$(dirname "$manifest")" && sha256sum -c checksums.sha256)
          done < <(find fixtures/cases -name checksums.sha256 -print | sort)
          (cd examples/handoff-web-blackbox-v0 && sha256sum -c checksums.sha256)

      - name: Verify deterministic reference handoff
        run: |
          python -m reference.build_example_v0
          git diff --exit-code -- examples/handoff-web-blackbox-v0

      - name: Verify reproducible static Linux amd64 build
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags='-s -w -X github.com/vtrpza/reconctx/internal/version.Version=v0.1.0-ci' -o /tmp/reconctx-ci-a ./cmd/reconctx
          go build -trimpath -ldflags='-s -w -X github.com/vtrpza/reconctx/internal/version.Version=v0.1.0-ci' -o /tmp/reconctx-ci-b ./cmd/reconctx
          cmp /tmp/reconctx-ci-a /tmp/reconctx-ci-b
